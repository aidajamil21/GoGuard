name: goguard
description: GOguard - Transfer Guardian scam prevention app

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Fonts
  google_fonts: ^6.1.0

  # HTTP client for Alibaba API
  http: ^1.1.0

  # AWS Amplify
  amplify_flutter: ^2.0.0
  amplify_auth_cognito: ^2.0.0
  amplify_api: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.4
  mocktail: ^1.0.0
  glados: 1.1.7
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
